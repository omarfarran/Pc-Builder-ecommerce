         <div class="reset-card">
             <h5 class="text-white fw-semibold mb-1">Reset password</h5>
             <p class="text-secondary small mb-4">Enter your email address and we'll send you a link to reset your password</p>

             <form action="../Php/forgot_password.php" method="POST">
                 <label class="text-white fw-semibold mb-1">Email</label>
                 <input
                         type="email"
                         name="email"
                         required
                         class="form-control bg-dark text-white border-dark mb-4"
                         placeholder="Enter your email address"
                 >

                 <button type="submit" name="submit_reset" class="btn btn-light w-100 fw-semibold mb-3">
                     Send reset link

             </form>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orders Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../Css/admin/admin.css">
</head>

<body>
<div class="admin-wrapper">

    <aside class="sidebar">
        <h4 class="logo">PC Builder Admin</h4>
        <ul class="menu">
            <li><a href="../admin/dashboard.html">Dashboard</a></li>
            <li class="active"><a href="../admin/orders.html">Orders</a></li>
            <li><a href="../admin/products.html">Products</a></li>
        </ul>
        <div class="admin-footer">
            <p id="admin-name">Admin User</p>
            <button class="btn btn-danger btn-sm" onclick="logout()">Sign Out</button>
        </div>
    </aside>

    <main class="main">
        <h2>Orders Management</h2>
        <p class="text-white">View and manage all customer orders from the database</p>

        <div class="row g-4 my-4">
            <div class="col-md-3"><div class="stat-card"><h6>Total Orders</h6><h3 id="stat-total-orders">0</h3></div></div>
            <div class="col-md-3"><div class="stat-card"><h6>Pending</h6><h3 id="stat-pending">0</h3></div></div>
            <div class="col-md-3"><div class="stat-card"><h6>Processing</h6><h3 id="stat-processing">0</h3></div></div>
            <div class="col-md-3"><div class="stat-card"><h6>Total Revenue</h6><h3 id="stat-revenue">$0</h3></div></div>
        </div>

        <div class="orders-filters mb-4 d-flex gap-3">
            <div class="search-box flex-grow-1">
                <input type="text" id="orders-search" class="form-control bg-dark text-white border-secondary" placeholder="Search by name or ID..." oninput="filterOrders()">
            </div>
            <select id="status-filter" class="form-select bg-dark text-white border-secondary w-25" onchange="filterOrders()">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="processing">Processing</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>

        <div class="card-dark p-0">
            <table class="table table-dark table-hover mb-0">
                <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Total</th>
                    <th>Items</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="orders-body">
                </tbody>
            </table>
        </div>
    </main>
</div>

<div id="itemsModal" class="modal-overlay d-none">
    <div class="modal-card">
        <div class="modal-header d-flex justify-content-between">
            <h4>Order Details</h4>
            <button class="btn btn-close btn-close-white" onclick="closeItemsModal()"></button>
        </div>
        <div class="modal-body mt-3">
            <table class="table table-dark table-sm">
                <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Qty</th>
                    <th>Price</th>
                </tr>
                </thead>
                <tbody id="items-list-body">
                </tbody>
            </table>
        </div>
        <div class="modal-footer mt-3 text-end">
            <button class="btn btn-secondary" onclick="closeItemsModal()">Close</button>
        </div>
    </div>
</div>

<script src="../Js/admin/orders.js"></script>
</body>
</html>
